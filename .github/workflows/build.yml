name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk git zip unzip python3-pip
          pip3 install buildozer
      
      - name: Build APK
        run: |
          # نستخدم SDK الموجود في GitHub Actions مباشرة
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_API=33
          export ANDROID_MIN_API=21
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlNisr-APK
          path: bin/*.apk
